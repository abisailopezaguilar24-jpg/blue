<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Inicio — For you, My Blue</title>
<link rel="stylesheet" href="css/estilos-base.css" />
<link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <main class="home-fondo">

    <!-- Gerberas decorativas (SVG original, dibujado a mano, sin stock) -->
    <svg class="flor-decorativa flor-superior" viewBox="0 0 200 200" aria-hidden="true">
      <g transform="translate(100,100)">
        <g fill="#fffbea" stroke="#f3d27a" stroke-width="2">
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(0)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(30)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(60)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(90)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(120)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(150)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(180)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(210)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(240)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(270)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(300)"/>
          <ellipse cx="0" cy="-55" rx="16" ry="42" transform="rotate(330)"/>
        </g>
        <circle r="24" fill="#e8791a" stroke="#a85a12" stroke-width="1.5"/>
        <circle r="24" fill="url(#textura-centro)"/>
      </g>
      <defs>
        <radialGradient id="textura-centro" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#ffb648" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#e8791a" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>

    <svg class="flor-decorativa flor-inferior" viewBox="0 0 200 200" aria-hidden="true">
      <g transform="translate(100,100)">
        <g fill="#ffe08a" stroke="#e0a83a" stroke-width="2">
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(0)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(36)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(72)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(108)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(144)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(180)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(216)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(252)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(288)"/>
          <ellipse cx="0" cy="-52" rx="15" ry="40" transform="rotate(324)"/>
        </g>
        <circle r="22" fill="#c9581c" stroke="#8a3a12" stroke-width="1.5"/>
      </g>
    </svg>

    <!-- Barra superior: sobre (cartas enviadas) + campana (bandeja de entrada) -->
    <div class="home-barra-superior">
      <button class="home-icono-circulo" id="btn-enviadas" aria-label="Tus cartas enviadas">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5c4400" stroke-width="1.6">
          <rect x="2.5" y="5" width="19" height="14" rx="1.5"/>
          <path d="M3 6l9 7 9-7"/>
        </svg>
      </button>

      <button class="home-icono-circulo" id="btn-bandeja" aria-label="Bandeja de entrada">
        <svg viewBox="0 0 24 24" fill="#5c4400">
          <path d="M12 2a6 6 0 0 0-6 6v3.6c0 .8-.3 1.6-.9 2.2L4 15h16l-1.1-1.2a3 3 0 0 1-.9-2.2V8a6 6 0 0 0-6-6zM9.5 19a2.5 2.5 0 0 0 5 0h-5z"/>
        </svg>
        <span class="home-badge" id="badge-no-leidas" hidden>0</span>
      </button>
    </div>

    <!-- Corazones que suben flotando -->
    <div class="home-corazones" id="contenedor-corazones" aria-hidden="true"></div>

    <!-- Botón central "+" con anillo de pétalos, para escribir carta nueva -->
    <div class="home-boton-mas-wrap">
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>
      <span class="petalo-boton"></span>

      <button class="home-boton-mas" id="btn-nueva-carta" aria-label="Escribir nueva carta">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5c4400" stroke-width="3" stroke-linecap="round">
          <path d="M12 4v16M4 12h16"/>
        </svg>
      </button>
    </div>

    <!-- Tarjeta de bienvenida -->
    <section class="home-tarjeta aparecer">
      <span class="home-tarjeta-flor">🌼</span>
      <h1 id="home-bienvenida">Welcome</h1>
      <p id="home-frase">Cargando...</p>
    </section>

    <p class="home-firma">For you, My Blue 💛💛</p>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
