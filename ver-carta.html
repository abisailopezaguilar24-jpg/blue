<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Carta — For you, My Blue</title>
<link rel="stylesheet" href="css/estilos-base.css" />
<link rel="stylesheet" href="css/hojas.css" />
<link rel="stylesheet" href="css/ver-carta.css" />
</head>
<body class="fondo-amarillo">

  <div class="ver-carta-layout">

    <div class="ver-carta-hoja-wrap">
      <div class="hoja-base" id="hoja-visor">
        <div class="hoja-contenido">
          <div class="hoja-fecha">
            <span id="carta-fecha"></span>
            <span id="carta-hora"></span>
          </div>
          <p class="hoja-texto" id="carta-texto"></p>
        </div>
      </div>
    </div>

    <div class="ver-carta-controles">
      <p class="ver-carta-hoja-contador" id="contador-hoja">Hoja 1/1</p>

      <div class="ver-carta-flechas">
        <button class="ver-carta-flecha" id="btn-anterior" aria-label="Hoja anterior">
          <svg viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8" stroke="black" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ver-carta-flecha" id="btn-siguiente" aria-label="Hoja siguiente">
          <svg viewBox="0 0 24 24"><path d="M9 4l8 8-8 8" stroke="black" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <p class="ver-carta-cargando" id="ver-carta-cargando">Cargando carta...</p>

  <script type="module" src="js/ver-carta.js"></script>
</body>
</html>
